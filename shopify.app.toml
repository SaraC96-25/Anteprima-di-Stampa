# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "0d0f24f826e3662f16b82c8394adb60e"
name = "Anteprima di Stampa"
application_url = "https://anteprima-di-stampa-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"

[product.metafields.app.preview_enabled]
name = "Anteprima di stampa attiva"
description = "Indica se il prodotto ha l'anteprima di stampa abilitata dall'app."
type = "boolean"
access.admin = "merchant_read_write"

[auth]
redirect_urls = [
  "https://anteprima-di-stampa-production.up.railway.app/auth/callback",
  "https://anteprima-di-stampa-production.up.railway.app/auth/shopify/callback",
  "https://anteprima-di-stampa-production.up.railway.app/api/auth",
]
