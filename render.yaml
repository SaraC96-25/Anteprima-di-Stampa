services:
  - type: web
    name: anteprima-di-stampa
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run setup && npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dev.sqlite
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_products,write_products
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
